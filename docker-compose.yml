version: "3.9"

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  calendar-net:
    driver: bridge

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:

# ─── Services ─────────────────────────────────────────────────────────────────
services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: calendar_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-calendardb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - calendar-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Flask Backend ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: calendar_backend
    restart: unless-stopped
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-calendardb}
      SECRET_KEY: ${SECRET_KEY:-dev-secret}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-jwt-dev-secret}
    ports:
      - "5000:5000"
    networks:
      - calendar-net
    depends_on:
      db:
        condition: service_healthy
    # En dev: hot reload con flask
    command: >
      sh -c "flask --app run:app db upgrade 2>/dev/null || true &&
             python run.py"
    volumes:
      - ./backend:/app  # hot reload

  # ── Flutter Web (solo para prod/demo local) ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_URL: http://localhost:5000/api
    container_name: calendar_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - calendar-net
    depends_on:
      - backend
    profiles:
      - web  # Solo se levanta con: docker compose --profile web up
