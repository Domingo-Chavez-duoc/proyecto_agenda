version: "3.9"

# Uso: docker compose -f docker-compose.prod.yml up -d
# Las imágenes se toman desde GHCR (ya buildeadas por CI/CD)

networks:
  calendar-net:
    driver: bridge

volumes:
  postgres_data:

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - calendar-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/calendar-backend:latest
    restart: always
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    ports:
      - "5000:5000"
    networks:
      - calendar-net
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/calendar-frontend:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    networks:
      - calendar-net
    depends_on:
      - backend
