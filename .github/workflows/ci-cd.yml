name: CI / CD — Calendar App

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/calendar-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/calendar-frontend

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — Backend CI (lint + tests)
  # ───────────────────────────────────────────────────────────────────────────
  backend-ci:
    name: 🐍 Backend — Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 app/ --max-line-length=100 --exclude=migrations/

      - name: Run tests
        env:
          FLASK_ENV: testing
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          JWT_SECRET_KEY: test-secret
          SECRET_KEY: test-secret
        run: |
          pip install pytest pytest-cov
          pytest --cov=app --cov-report=xml -v || echo "No tests found yet"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — Flutter CI (analyze + build web)
  # ───────────────────────────────────────────────────────────────────────────
  frontend-ci:
    name: 🐦 Flutter — Analyze & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.0"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (dart analyze)
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test || echo "No tests found yet"

      - name: Build web (release)
        run: flutter build web --release --dart-define=API_URL=https://api.example.com/api

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: frontend/build/web/
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 — Build & Push Docker images to GHCR (solo en main)
  # ───────────────────────────────────────────────────────────────────────────
  docker-build-push:
    name: 🐳 Docker — Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Backend image ───────────────────────────────────────────────────────
      - name: Extract metadata — Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
            type=ref,event=branch

      - name: Build & push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend image ──────────────────────────────────────────────────────
      - name: Extract metadata — Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
            type=ref,event=branch

      - name: Build & push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            API_URL=${{ vars.API_URL || 'https://api.example.com/api' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───────────────────────────────────────────────────────────────────────────
  # TODO: agregar deploymente job 
